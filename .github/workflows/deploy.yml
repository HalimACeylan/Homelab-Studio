name: Deploy to GitHub Pages

on:
  push:
    branches: [main, release]
  workflow_dispatch:

# Scope writes to contents only (gh-pages push). Everything else is read-only.
permissions:
  contents: write

# Allow only one concurrent deployment; cancel older runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    # Hard guard: only the repository owner can trigger a deploy,
    # even if someone somehow queues this workflow.
    if: github.actor == 'HalimACeylan'

    steps:
      - name: Checkout repository
        run: |
          git clone --depth 1 \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git .

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to gh-pages branch
        run: |
          cd dist
          git init
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git commit -m "Deploy: ${{ github.sha }}"
          git push --force \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git \
            HEAD:gh-pages
