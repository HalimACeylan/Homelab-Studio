name: CI

on:
  push:
    branches: [main, release]
  pull_request:
    branches: [main, release]

# Minimal read-only permissions — prevents fork PRs from using
# the GITHUB_TOKEN to write anything to the repository.
permissions:
  contents: read

jobs:
  build:
    name: Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        # Use the public HTTPS URL — no token needed for a public repo.
        # This is safe for fork pull_requests because no write token is exposed.
        run: |
          git clone --depth 1 ${{ github.server_url }}/${{ github.repository }}.git .
          git checkout ${{ github.sha }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
